name: Build macOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .app bundle structure
        run: |
          mkdir -p Wiremann.app/Contents/MacOS
          mkdir -p Wiremann.app/Contents/Resources
          cp target/${{ matrix.target }}/release/wiremann Wiremann.app/Contents/MacOS/wiremann
          chmod +x Wiremann.app/Contents/MacOS/wiremann
          cp assets/icon.icns Wiremann.app/Contents/Resources/icon.icns

      - name: Create Info.plist
        run: |
          cat > Wiremann.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>wiremann</string>
              <key>CFBundleName</key>
              <string>Wiremann</string>
              <key>CFBundleIdentifier</key>
              <string>com.wiremann.app</string>
              <key>CFBundleVersion</key>
              <string>0.1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>0.1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Create portable ZIP
        run: |
          ditto -c -k --keepParent Wiremann.app Wiremann-${{ matrix.arch }}-portable.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiremann-macos-${{ matrix.arch }}-portable
          path: Wiremann-${{ matrix.arch }}-portable.zip
          retention-days: 30

      - name: Create DMG installer (only for tags and PRs)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
        run: |
          mkdir -p dmg_temp
          cp -r Wiremann.app dmg_temp/Wiremann.app
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "Wiremann" -srcfolder dmg_temp -ov -format UDZO Wiremann-${{ matrix.arch }}.dmg
          rm -rf dmg_temp

      - name: Upload DMG installer artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wiremann-macos-${{ matrix.arch }}-dmg
          path: Wiremann-${{ matrix.arch }}.dmg
          retention-days: 30

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf Wiremann.app
          rm -rf target