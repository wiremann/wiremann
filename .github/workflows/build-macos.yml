name: Build macOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .app bundle structure
        run: |
          mkdir -p Wiremann.app/Contents/MacOS
          mkdir -p Wiremann.app/Contents/Resources
          cp target/${{ matrix.target }}/release/wiremann Wiremann.app/Contents/MacOS/wiremann
          chmod +x Wiremann.app/Contents/MacOS/wiremann
          cp assets/icon.icns Wiremann.app/Contents/Resources/icon.icns

      - name: Create Info.plist
        run: |
          cat > Wiremann.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>wiremann</string>
              <key>CFBundleName</key>
              <string>Wiremann</string>
              <key>CFBundleIdentifier</key>
              <string>com.wiremann.app</string>
              <key>CFBundleVersion</key>
              <string>0.1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>0.1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Create portable app directory
        run: |
          mkdir -p dist
          cp -r Wiremann.app dist/Wiremann-${{ matrix.arch }}.app

      - name: Upload portable to Latest Unstable (main and PRs)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-unstable
          name: Latest Unstable Build
          prerelease: true
          files: dist/Wiremann-${{ matrix.arch }}.app/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create DMG (only for semantic version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dmg_temp
          cp -r Wiremann.app dmg_temp/Wiremann.app
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "Wiremann" -srcfolder dmg_temp -ov -format UDZO Wiremann-${{ matrix.arch }}.dmg
          rm -rf dmg_temp

      - name: Upload to semantic version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/Wiremann-${{ matrix.arch }}.app
            Wiremann-${{ matrix.arch }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf Wiremann.app
          rm -rf dist
          rm -rf target