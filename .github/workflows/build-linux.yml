name: Build Linux

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libfontconfig1-dev

      - name: Install cross for aarch64
        if: matrix.arch == 'aarch64'
        run: cargo install cross

      - name: Build release (x86_64)
        if: matrix.arch == 'x86_64'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (aarch64)
        if: matrix.arch == 'aarch64'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare portable directory
        run: |
          mkdir -p dist/wiremann-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/wiremann dist/wiremann-${{ matrix.arch }}/wiremann
          chmod +x dist/wiremann-${{ matrix.arch }}/wiremann
          cp assets/icon.png dist/wiremann-${{ matrix.arch }}/icon.png

      - name: Create .desktop file
        run: |
          cat > dist/wiremann-${{ matrix.arch }}/wiremann.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Wiremann
          Comment=A fast music player built in Rust
          Exec=wiremann
          Icon=icon.png
          Categories=Audio;AudioVideo;
          Terminal=false
          Keywords=music;player;audio;
          EOF

      - name: Create portable tarball
        run: |
          cd dist
          tar -czvf wiremann-linux-${{ matrix.arch }}-portable.tar.gz wiremann-${{ matrix.arch }}
          cd ..

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiremann-linux-${{ matrix.arch }}-portable
          path: dist/wiremann-linux-${{ matrix.arch }}-portable.tar.gz
          retention-days: 30

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf dist
          rm -rf target