name: Release

on:
  push:
    tags: [ "v*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (reduce size)
        run: |
          strip target/${{ matrix.target }}/release/wiremann${{ matrix.ext }} || true

      - name: Bundle app
        run: cargo bundle --release

      - name: Prepare package
        run: |
          mkdir dist

          # Raw binary (portable)
          cp target/${{ matrix.target }}/release/wiremann${{ matrix.ext }} dist/ || true

          # Bundled outputs (icons, app structure)
          if [ -d "target/release/bundle" ]; then
            cp -r target/release/bundle/* dist/ || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}