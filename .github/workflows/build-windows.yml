name: Build Windows

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            arch: aarch64

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create portable directory
        run: |
          mkdir -p dist\wiremann-windows-${{ matrix.arch }}
          copy target\${{ matrix.target }}\release\wiremann.exe dist\wiremann-windows-${{ matrix.arch }}\wiremann.exe
          copy assets\icon.ico dist\wiremann-windows-${{ matrix.arch }}\icon.ico

      - name: Upload portable to Latest Unstable (main and PRs)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-unstable
          name: Latest Unstable Build
          prerelease: true
          allow_update: true
          files: dist/wiremann-windows-${{ matrix.arch }}/wiremann.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup (only for semantic version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup -y --no-progress

      - name: Wait for Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: Start-Sleep -Seconds 5

      - name: Build installer (x86_64)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.arch == 'x86_64'
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q "package\inno\Wiremann_x86_64.iss"

      - name: Build installer (aarch64)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.arch == 'aarch64'
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q "package\inno\Wiremann_aarch64.iss"

      - name: Upload to semantic version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/wiremann-windows-${{ matrix.arch }}/wiremann.exe
            package/inno/Output/WiremannSetup_${{ matrix.arch }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force target -ErrorAction SilentlyContinue
