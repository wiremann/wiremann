name: Build Windows

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create portable directory structure
        run: |
          mkdir -p dist\wiremann-${{ matrix.arch }}
          copy target\${{ matrix.target }}\release\wiremann.exe dist\wiremann-${{ matrix.arch }}\wiremann.exe
          copy assets\icon.ico dist\wiremann-${{ matrix.arch }}\icon.ico

      - name: Create portable archive
        shell: pwsh
        run: |
          cd dist
          tar -czvf wiremann-windows-${{ matrix.arch }}-portable.tar.gz wiremann-${{ matrix.arch }}
          cd ..

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiremann-windows-${{ matrix.arch }}-portable
          path: dist/wiremann-windows-${{ matrix.arch }}-portable.tar.gz
          retention-days: 30

      - name: Install Inno Setup (only for tags and PRs)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
        run: choco install innosetup -y --no-progress

      - name: Wait for Inno Setup
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
        run: Start-Sleep -Seconds 5

      - name: Build installer (x86_64)
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request') && matrix.arch == 'x86_64'
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q "package\inno\Wiremann_x86_64.iss"

      - name: Build installer (aarch64)
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request') && matrix.arch == 'aarch64'
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q "package\inno\Wiremann_aarch64.iss"

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wiremann-windows-${{ matrix.arch }}-installer
          path: package/inno/Output/WiremannSetup_${{ matrix.arch }}.exe
          retention-days: 30

      - name: Cleanup build artifacts
        if: always()
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force target -ErrorAction SilentlyContinue