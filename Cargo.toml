[package]
name = "wiremann"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
crossbeam = "0.8.4"
crossbeam-channel = "0.5.15"
gpui = { git = "https://github.com/zed-industries/zed" }
gpui-component = { git = "https://github.com/anantnrg/gpui-component" }
gpui-component-assets = { git = "https://github.com/anantnrg/gpui-component" }
image = "0.25.9"
lofty = "0.23.1"
rayon = "1.11.0"
rodio = { version = "0.21.1", features = ["symphonia-all"] }
rust-embed = "8.11.0"
serde = { version = "1.0.228", features = ["derive"] }
smallvec = "1.15.1"
walkdir = "2.5.0"
ahash = "0.8.12"
num_cpus = "1.17.0"
rand = "0.10.0"
bitcode = "0.6.9"
dirs = "4.0.0"
uuid = { version = "1.20.0", features = ["serde", "v4"] }
ron = "0.12.0"
thiserror = "2.0.18"
blake3 = "1.8.3"
